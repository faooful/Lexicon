<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Tiny World Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4ede0;
    --panel: #ffffff;
    --ink: #2a2722;
    --muted: #8a847a;
    --line: #ebe3d2;
    --line-soft: #f3ecdc;
    --accent: #3a72c8;
    --shadow: 0 18px 50px -20px rgba(50, 35, 10, 0.18), 0 2px 6px -2px rgba(50, 35, 10, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; z-index: 2; }
  canvas { display: block; cursor: grab; }
  canvas.placing { cursor: crosshair; }
  canvas.dragging { cursor: grabbing; }

  .brand {
    position: fixed;
    top: 26px; left: 28px;
    pointer-events: none;
    z-index: 10;
  }
  .brand .title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand .title em {
    font-style: italic;
    font-weight: 400;
    color: #a08454;
  }
  .brand .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.02em;
  }

  .controls {
    position: fixed;
    top: 26px; right: 28px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 9px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 1px 0 rgba(60, 40, 10, 0.04);
    transition: background 0.12s, transform 0.08s;
  }
  .btn:hover { background: #faf5ea; }
  .btn:active { transform: translateY(1px); }
  .btn.on {
    background: #f4ecd8;
    border-color: #d8c79e;
  }
  .btn.on::before {
    content: '●';
    color: #6fb442;
    margin-right: 4px;
    font-size: 9px;
    vertical-align: 1px;
  }

  .toolbar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    padding: 10px;
    border-radius: 18px;
    display: flex;
    gap: 4px;
    box-shadow: var(--shadow);
    z-index: 10;
    max-width: calc(100vw - 32px);
    overflow-x: auto;
  }
  .tool {
    width: 60px;
    height: 64px;
    border: 1px solid transparent;
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-family: inherit;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.08s;
    flex-shrink: 0;
  }
  .tool:hover { background: var(--line-soft); color: var(--ink); }
  .tool.active {
    background: #f4ecd8;
    border-color: #d8c79e;
    color: var(--ink);
  }
  .tool:active { transform: translateY(1px); }
  .tool .swatch {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.14), 0 1px 2px rgba(0, 0, 0, 0.06);
    position: relative;
    overflow: hidden;
  }
  .tool .swatch.eraser {
    background: repeating-linear-gradient(45deg, #e8e3d6, #e8e3d6 3px, #d6cdb8 3px, #d6cdb8 6px) !important;
    box-shadow: inset 0 0 0 1px #c4ba9e;
  }
  .tool kbd {
    display: inline-block;
    font-family: 'Inter', monospace;
    font-size: 9px;
    color: #b9b1a3;
    margin-top: -2px;
  }

  .help {
    position: fixed;
    bottom: 28px; right: 28px;
    font-size: 11.5px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
    z-index: 10;
    pointer-events: none;
  }
  .help kbd {
    display: inline-block;
    padding: 1.5px 5px;
    border-radius: 4px;
    background: var(--panel);
    border: 1px solid var(--line);
    font-size: 10.5px;
    font-family: inherit;
    color: var(--ink);
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: multiply;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.15 0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  @media (max-width: 600px) {
    .brand .title { font-size: 22px; }
    .help { display: none; }
    .controls { top: 20px; right: 20px; }
    .brand { top: 20px; left: 20px; }
    .toolbar { bottom: 16px; padding: 6px; gap: 2px; }
    .tool { width: 52px; height: 56px; font-size: 10px; }
    .tool .swatch { width: 22px; height: 22px; }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="brand">
    <div class="title">Tiny World <em>Builder</em></div>
    <div class="sub">Click to place · drag to orbit · scroll to zoom</div>
  </div>

  <div class="controls">
    <button class="btn" id="persp">Perspective</button>
    <button class="btn" id="reset">↺ Reset</button>
    <button class="btn" id="clear">Clear</button>
  </div>

  <div class="toolbar" id="toolbar"></div>

  <div class="help">
    <kbd>1</kbd>–<kbd>9</kbd> tools · <kbd>E</kbd> erase<br/>
    <kbd>P</kbd> perspective · <kbd>R</kbd> reset · <kbd>C</kbd> clear
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  /* =====================================================================
     Tiny World Builder — single-file Three.js scene + tile editor
     ===================================================================== */

  // -------- constants --------
  const GRID = 8;
  const TILE = 1;
  const TOP_H = 0.18;     // grass slab thickness
  const DIRT_H = 0.55;    // dirt block height (visible side)

  // -------- scene / renderer --------
  const container = document.getElementById('app');
  const canvasEl = document.createElement('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.NoToneMapping;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf4ede0);

  // -------- cameras (orthographic + perspective) --------
  let viewSize = 7.5;
  let cameraMode = 'ortho'; // 'ortho' | 'perspective'

  const aspect0 = window.innerWidth / window.innerHeight;
  const orthoCam = new THREE.OrthographicCamera(
    -viewSize * aspect0, viewSize * aspect0,
    viewSize, -viewSize,
    0.1, 200
  );
  // narrow FOV + far distance gives the "miniature/telephoto" look that
  // sits closest to the iso aesthetic while still showing real depth.
  const persCam = new THREE.PerspectiveCamera(28, aspect0, 0.1, 200);
  let camera = orthoCam;

  // orbit state
  let azimuth = Math.PI * 0.25;   // around Y
  let polar   = Math.PI * 0.32;   // from +Y axis
  const target = new THREE.Vector3(0, 0, 0);

  function updateCamera() {
    // ortho: fixed orbit radius — frustum size controls zoom.
    // perspective: radius scales with viewSize so wheel-zoom stays consistent.
    const r = cameraMode === 'ortho' ? 14 : viewSize * 4.2;
    camera.position.x = target.x + r * Math.sin(polar) * Math.cos(azimuth);
    camera.position.y = target.y + r * Math.cos(polar);
    camera.position.z = target.z + r * Math.sin(polar) * Math.sin(azimuth);
    camera.lookAt(target);
  }
  updateCamera();

  // -------- lighting --------
  // Neutral hemisphere — warm sky was dyeing everything cream-yellow.
  const hemi = new THREE.HemisphereLight(0xffffff, 0xb39879, 0.30);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(7, 12, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -10;
  sun.shadow.camera.right = 10;
  sun.shadow.camera.top = 10;
  sun.shadow.camera.bottom = -10;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 35;
  sun.shadow.bias = -0.0006;
  sun.shadow.radius = 3;
  scene.add(sun);
  // No ambient — hemi handles fill, ambient just compresses contrast & saturation.

  // -------- geometry helpers --------
  // A rounded extruded slab — used for tile pieces.
  function roundedSlab(size, height, radius = 0.07) {
    const w = size / 2;
    const r = Math.min(radius, w - 0.01);
    const shape = new THREE.Shape();
    shape.moveTo(-w + r, -w);
    shape.lineTo(w - r, -w);
    shape.quadraticCurveTo(w, -w, w, -w + r);
    shape.lineTo(w, w - r);
    shape.quadraticCurveTo(w, w, w - r, w);
    shape.lineTo(-w + r, w);
    shape.quadraticCurveTo(-w, w, -w, w - r);
    shape.lineTo(-w, -w + r);
    shape.quadraticCurveTo(-w, -w, -w + r, -w);

    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: height,
      bevelEnabled: true,
      bevelSegments: 2,
      bevelSize: 0.04,
      bevelThickness: 0.04,
      curveSegments: 4
    });
    geo.rotateX(-Math.PI / 2);
    // After rotation Y spans [0, height]
    return geo;
  }

  // A rounded box — for some objects we want a softer cube look.
  function roundedBox(w, h, d, r = 0.05) {
    const shape = new THREE.Shape();
    const hw = w / 2, hd = d / 2;
    const rr = Math.min(r, hw - 0.001, hd - 0.001);
    shape.moveTo(-hw + rr, -hd);
    shape.lineTo(hw - rr, -hd);
    shape.quadraticCurveTo(hw, -hd, hw, -hd + rr);
    shape.lineTo(hw, hd - rr);
    shape.quadraticCurveTo(hw, hd, hw - rr, hd);
    shape.lineTo(-hw + rr, hd);
    shape.quadraticCurveTo(-hw, hd, -hw, hd - rr);
    shape.lineTo(-hw, -hd + rr);
    shape.quadraticCurveTo(-hw, -hd, -hw + rr, -hd);
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: h,
      bevelEnabled: true,
      bevelSegments: 1,
      bevelSize: 0.02,
      bevelThickness: 0.02,
      curveSegments: 3
    });
    geo.rotateX(-Math.PI / 2);
    geo.translate(0, 0, 0);
    return geo;
  }

  // -------- materials --------
  // Lambert (not Standard): non-PBR diffuse only, much more direct color response.
  // Stylized low-poly looks better with flat shading than physical energy conservation.
  const M = {
    grass:     new THREE.MeshLambertMaterial({ color: 0xb0d949 }),
    grassEdge: new THREE.MeshLambertMaterial({ color: 0x95c138 }),
    dirt:      new THREE.MeshLambertMaterial({ color: 0x7d4519 }),
    dirtRich:  new THREE.MeshLambertMaterial({ color: 0x462b15 }),
    path:      new THREE.MeshLambertMaterial({ color: 0xf2d29c }),
    water:     new THREE.MeshLambertMaterial({ color: 0x3a8fcc }),

    trunk:     new THREE.MeshLambertMaterial({ color: 0x5c3818 }),
    leaves:    new THREE.MeshLambertMaterial({ color: 0x86d139 }),
    leavesDk:  new THREE.MeshLambertMaterial({ color: 0x5fab26 }),

    wallCream: new THREE.MeshLambertMaterial({ color: 0xf2dfb0 }),
    wallTrim:  new THREE.MeshLambertMaterial({ color: 0xe5cf99 }),
    roofBlue:  new THREE.MeshLambertMaterial({ color: 0x2a6dd1 }),
    roofBlueD: new THREE.MeshLambertMaterial({ color: 0x1d4d9c }),
    door:      new THREE.MeshLambertMaterial({ color: 0x7a4a2e }),
    woodTrim:  new THREE.MeshLambertMaterial({ color: 0x5c3818 }),
    windowB:   new THREE.MeshLambertMaterial({ color: 0x2a6dd1 }),
    chimney:   new THREE.MeshLambertMaterial({ color: 0xc9c4ba }),
    step:      new THREE.MeshLambertMaterial({ color: 0xa9a49a }),
    knob:      new THREE.MeshLambertMaterial({ color: 0xe8c050 }),

    fence:     new THREE.MeshLambertMaterial({ color: 0x7d4519 }),
    cropLeaf:  new THREE.MeshLambertMaterial({ color: 0x96d943 }),
    cropStem:  new THREE.MeshLambertMaterial({ color: 0x5e9c2e }),

    hover:     new THREE.MeshBasicMaterial({ color: 0x2a2722, transparent: true, opacity: 0.18, depthWrite: false }),
    hoverErase:new THREE.MeshBasicMaterial({ color: 0xb84838, transparent: true, opacity: 0.28, depthWrite: false }),
  };

  function castReceive(obj) {
    obj.traverse(c => {
      if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });
    return obj;
  }

  // -------- tile factory --------
  function makeTile(terrain) {
    const g = new THREE.Group();
    g.userData = { kind: 'tile', terrain };

    // dirt block (sides + bottom of tile)
    const dirt = new THREE.Mesh(roundedSlab(TILE * 0.98, DIRT_H, 0.06), M.dirt);
    dirt.position.y = -DIRT_H;
    g.add(dirt);

    // top cap
    let topMat = M.grass;
    if (terrain === 'path')  topMat = M.path;
    if (terrain === 'water') topMat = M.water;
    if (terrain === 'dirt')  topMat = M.dirtRich;

    const top = new THREE.Mesh(roundedSlab(TILE * 0.98, TOP_H, 0.06), topMat);
    top.position.y = 0;
    g.add(top);

    // tiny grass details on grass tiles (very subtle)
    if (terrain === 'grass' && Math.random() < 0.18) {
      const fleck = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.04, 0.05),
        M.leavesDk
      );
      fleck.position.set((Math.random() - 0.5) * 0.6, TOP_H + 0.01, (Math.random() - 0.5) * 0.6);
      g.add(fleck);
    }

    // path scuff: little dimple on path tiles
    if (terrain === 'path') {
      const scuff = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.02, 0.08),
        new THREE.MeshStandardMaterial({ color: 0xd4be8c, roughness: 0.95 })
      );
      scuff.position.set((Math.random() - 0.5) * 0.4, TOP_H + 0.005, (Math.random() - 0.5) * 0.4);
      g.add(scuff);
    }

    castReceive(g);
    return g;
  }

  // -------- object factories --------
  function makeTree() {
    const g = new THREE.Group();

    const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.5, 0.18), M.trunk);
    trunk.position.y = 0.25;
    g.add(trunk);

    const lower = new THREE.Mesh(roundedBox(0.62, 0.42, 0.62, 0.08), M.leaves);
    lower.position.y = 0.5;
    g.add(lower);

    const upper = new THREE.Mesh(roundedBox(0.42, 0.32, 0.42, 0.06), M.leaves);
    upper.position.y = 0.92;
    g.add(upper);

    const tip = new THREE.Mesh(roundedBox(0.22, 0.18, 0.22, 0.04), M.leaves);
    tip.position.y = 1.18;
    g.add(tip);

    g.userData = { kind: 'tree', swayPhase: Math.random() * Math.PI * 2 };
    castReceive(g);
    return g;
  }

  // -------- house primitives + assembler --------
  // The house is decomposed into reusable parts. A "house plan" describes
  // which face each cell of a cluster presents (gable door at one end,
  // side doors elsewhere) and the assembler builds the geometry from
  // primitive parts. Both solo and cluster houses go through the same path,
  // so adding new shapes (L-cluster, square, etc.) only needs new plans.

  const H = {
    WALL_W: 0.82,        // short-axis wall width
    WALL_H: 0.55,        // wall height to eaves
    PEAK_Y: 0.87,        // ridge apex
    T:      0.06,        // roof slab thickness
    ROOF_OVERHANG: 0.3,  // roof depth = WALL_D + this (extends past long-axis ends)
  };

  const Parts = {
    // Wall volume — rounded box covering the cluster's long-axis extent.
    walls(WALL_D) {
      return new THREE.Mesh(roundedBox(H.WALL_W, H.WALL_H, WALL_D, 0.04), M.wallCream);
    },

    // Triangular gable panel (in XY plane, 0.04 thick in z). Caller positions.
    gable() {
      const shape = new THREE.Shape();
      shape.moveTo(-H.WALL_W / 2, H.WALL_H);
      shape.lineTo( H.WALL_W / 2, H.WALL_H);
      shape.lineTo(0, H.PEAK_Y);
      shape.closePath();
      const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.04, bevelEnabled: false, curveSegments: 1 });
      return new THREE.Mesh(geo, M.wallCream);
    },

    // Pitched roof: two slabs whose bottom faces sit along the gable hypotenuse,
    // plus a ridge cap. Origin at house centre. Front/back overhang can be set
    // asymmetrically — composite wings pass backOverhang=0 so the wing's inside
    // end doesn't poke through the main wing's roof.
    pitchedRoof(WALL_D, frontOverhang = 0.15, backOverhang = 0.15) {
      const g = new THREE.Group();
      const halfW = H.WALL_W / 2;
      const ROOF_DEPTH = WALL_D + frontOverhang + backOverhang;
      const ROOF_Z     = (frontOverhang - backOverhang) / 2; // shift centre when asymmetric
      const rise = H.PEAK_Y - H.WALL_H;
      const slabLen   = Math.sqrt(halfW * halfW + rise * rise);
      const slabAngle = Math.atan2(rise, halfW);
      const sa = Math.sin(slabAngle), ca = Math.cos(slabAngle);
      const slabGeo = new THREE.BoxGeometry(slabLen, H.T, ROOF_DEPTH);

      const slabL = new THREE.Mesh(slabGeo, M.roofBlue);
      slabL.position.set(-halfW / 2 - (H.T / 2) * sa, (H.WALL_H + H.PEAK_Y) / 2 + (H.T / 2) * ca, ROOF_Z);
      slabL.rotation.z = slabAngle;
      g.add(slabL);

      const slabR = new THREE.Mesh(slabGeo, M.roofBlue);
      slabR.position.set( halfW / 2 + (H.T / 2) * sa, (H.WALL_H + H.PEAK_Y) / 2 + (H.T / 2) * ca, ROOF_Z);
      slabR.rotation.z = -slabAngle;
      g.add(slabR);

      const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.06, ROOF_DEPTH + 0.02), M.roofBlueD);
      ridge.position.set(0, H.PEAK_Y + (H.T / 2) * ca + 0.005, ROOF_Z);
      g.add(ridge);
      return g;
    },

    // Hipped (pyramidal) roof — 4 triangular slabs meeting at a central apex.
    // Used for square / 2x2 footprints. Origin at base centre, base at y=0,
    // apex at y=rise. Built as a BufferGeometry pyramid with computed normals.
    hippedRoof(width, depth, rise) {
      const halfW = width / 2;
      const halfD = depth / 2;
      const verts = new Float32Array([
        0,      rise, 0,        // 0: apex
        -halfW, 0,    -halfD,   // 1: NW
         halfW, 0,    -halfD,   // 2: NE
         halfW, 0,     halfD,   // 3: SE
        -halfW, 0,     halfD,   // 4: SW
      ]);
      // CCW winding from outside (verified by cross-product: each face's outward
      // normal points away from the apex with the correct sign).
      const indices = new Uint16Array([
        0, 2, 1,  // north face (apex, ne, nw) — outward normal -z
        0, 3, 2,  // east face  (apex, se, ne) — outward normal +x
        0, 4, 3,  // south face (apex, sw, se) — outward normal +z
        0, 1, 4,  // west face  (apex, nw, sw) — outward normal -x
      ]);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      geo.setIndex(new THREE.BufferAttribute(indices, 1));
      geo.computeVertexNormals();
      return new THREE.Mesh(geo, M.roofBlue);
    },

    // Door + arches + knob. orientation:
    //   'gable' — door faces +z, outer face at z=0 of the part's local frame.
    //   'side'  — door faces +x, outer face at x=0.
    // Origin is at GROUND LEVEL beneath the door's outer face centre, so callers
    // place a door by setting its position to where the door's centre projects on the floor.
    door(orientation) {
      const g = new THREE.Group();
      if (orientation === 'gable') {
        const door = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.48, 0.04), M.door);
        door.position.set(0, 0.24, 0); g.add(door);
        const aL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.48, 0.04), M.woodTrim); aL.position.set(-0.10, 0.24, 0.01); g.add(aL);
        const aR = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.48, 0.04), M.woodTrim); aR.position.set( 0.10, 0.24, 0.01); g.add(aR);
        const aT = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.04, 0.04), M.woodTrim); aT.position.set(0,     0.50, 0.01); g.add(aT);
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), M.knob);
        knob.position.set(0.08, 0.24, 0.03); g.add(knob);
      } else {
        const door = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.48, 0.2), M.door);
        door.position.set(0, 0.24, 0); g.add(door);
        const aL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.48, 0.04), M.woodTrim); aL.position.set(0.01, 0.24, -0.10); g.add(aL);
        const aR = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.48, 0.04), M.woodTrim); aR.position.set(0.01, 0.24,  0.10); g.add(aR);
        const aT = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.24), M.woodTrim); aT.position.set(0.01, 0.50,  0   ); g.add(aT);
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), M.knob);
        knob.position.set(0.03, 0.24, 0.05); g.add(knob);
      }
      return g;
    },

    // Window with frame, glass and cross trims, layered along the outer-face axis.
    // Origin at the FRAME CENTRE; callers place by setting position to where the
    // frame's centre should sit on the wall surface.
    window(orientation, size = 'large') {
      const g = new THREE.Group();
      const f = size === 'small' ? 0.20 : 0.24; // frame
      const p = size === 'small' ? 0.14 : 0.17; // glass / cross length
      if (orientation === 'gable') {
        const wf = new THREE.Mesh(new THREE.BoxGeometry(f, f, 0.04),       M.woodTrim); wf.position.set(0, 0, 0);     g.add(wf);
        const wg = new THREE.Mesh(new THREE.BoxGeometry(p, p, 0.04),       M.windowB);  wg.position.set(0, 0, 0.015); g.add(wg);
        const cH = new THREE.Mesh(new THREE.BoxGeometry(p, 0.012, 0.04),   M.woodTrim); cH.position.set(0, 0, 0.025); g.add(cH);
        const cV = new THREE.Mesh(new THREE.BoxGeometry(0.012, p, 0.04),   M.woodTrim); cV.position.set(0, 0, 0.025); g.add(cV);
      } else {
        const wf = new THREE.Mesh(new THREE.BoxGeometry(0.04, f, f),       M.woodTrim); wf.position.set(0,     0, 0); g.add(wf);
        const wg = new THREE.Mesh(new THREE.BoxGeometry(0.04, p, p),       M.windowB);  wg.position.set(0.015, 0, 0); g.add(wg);
        const cH = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.012, p),   M.woodTrim); cH.position.set(0.025, 0, 0); g.add(cH);
        const cV = new THREE.Mesh(new THREE.BoxGeometry(0.04, p, 0.012),   M.woodTrim); cV.position.set(0.025, 0, 0); g.add(cV);
      }
      return g;
    },

    // Chimney stack. Origin at chimney CENTRE in y (so a position of y=0.85 puts
    // the bottom inside the wall and the top at y=1.15).
    chimney() {
      return new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.6, 0.14), M.chimney);
    },

    // Doorstep slab. Origin at step CENTRE.
    step(orientation) {
      return orientation === 'side'
        ? new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.26), M.step)
        : new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.06, 0.12), M.step);
    },

    // External staircase — chunky stylized stair climbing toward -z and +y
    // from the part's origin (placed at the bottom-front of the lowest step).
    // 6 steps; each step is full stepRise tall (no y overlap) but 1.4x wide
    // in depth so consecutive steps visually overlap in z.
    externalStairs(rise) {
      const g = new THREE.Group();
      const N = 6;
      const stepRise = rise / N;
      const stepRun  = 0.10;
      const width    = 0.22;
      for (let i = 0; i < N; i++) {
        const s = new THREE.Mesh(
          new THREE.BoxGeometry(width, stepRise, stepRun * 1.4),
          M.step
        );
        s.position.set(0, stepRise * (i + 0.5), -i * stepRun);
        g.add(s);
      }
      return g;
    },

    // Upper-floor door reached by external stairs. Same geometry as the side
    // door but smaller, intended to sit on a +x face.
    upperDoor() {
      const g = new THREE.Group();
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.42, 0.18), M.door);
      door.position.set(0, 0.21, 0); g.add(door);
      const aL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.42, 0.04), M.woodTrim); aL.position.set(0.01, 0.21, -0.09); g.add(aL);
      const aR = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.42, 0.04), M.woodTrim); aR.position.set(0.01, 0.21,  0.09); g.add(aR);
      const aT = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.22), M.woodTrim); aT.position.set(0.01, 0.44, 0   ); g.add(aT);
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.020, 8, 8), M.knob);
      knob.position.set(0.03, 0.21, 0.05); g.add(knob);
      return g;
    },
  };

  // A linear (1xN) plan: south-end cell uses the gable-end door, the rest use side
  // doors on the +x face, chimneys alternate forward/back per cell for visual rhythm.
  // For length 1 the chimney offset matches the original solo cottage.
  function linearHousePlan(length) {
    const cells = [];
    for (let i = 0; i < length; i++) {
      const isSouthEnd = (i === length - 1);
      const chimneyOffset = (length === 1) ? -0.05 : (i % 2 === 0 ? -0.15 : 0.15);
      cells.push({ face: isSouthEnd ? 'gable' : 'side', chimneyOffset });
    }
    return cells;
  }

  // Assemble a house from a cell plan. orientation: 'z' (long-axis along z, no
  // rotation) or 'x' (long-axis along x, geometry rotated +π/2 around Y).
  // floors: 1 (default), 2, 3 — walls stretch upward, per-floor windows added,
  // and at floors === 2 an exterior staircase appears against the +x face
  // leading to an upper door (floors >= 3 implies internal stairs and the
  // exterior set is removed). opts.{frontOverhang, backOverhang} let composite
  // wings trim the inside end of the roof so it doesn't poke through the main
  // wing's roof — pass backOverhang=0 to disable the inside overhang. opts.
  // suppressBackGable hides the -z gable triangle (used for composite wings,
  // since their back gable would be coplanar with the main wing's outer wall
  // and cause z-fighting / redundant geometry).
  function buildHouse(cells, orientation = 'z', floors = 1, opts = {}) {
    const { frontOverhang = 0.15, backOverhang = 0.15, suppressBackGable = false } = opts;
    const g = new THREE.Group();
    const length = cells.length;
    // Solo cottage keeps its original slimmer depth. Clusters fill the cells.
    const WALL_D = (length === 1) ? 0.7 : length * TILE - 0.18;
    const halfW = H.WALL_W / 2;
    const halfD = WALL_D / 2;
    const wallHTotal = H.WALL_H * floors;
    const roofLift   = (floors - 1) * H.WALL_H;

    // Walls — stretched in Y for upper floors. roundedBox extrudes from y=0
    // upward, so no y-shift is needed: bottom sits at ground, top at wallHTotal.
    const walls = new THREE.Mesh(roundedBox(H.WALL_W, wallHTotal, WALL_D, 0.04), M.wallCream);
    g.add(walls);

    // Gables sit above the top floor's wall top. Composite wings suppress the
    // back gable since it's coplanar with the main wing's outer wall.
    const gF = Parts.gable(); gF.position.set(0, roofLift, halfD - 0.04); g.add(gF);
    if (!suppressBackGable) {
      const gB = Parts.gable(); gB.position.set(0, roofLift, -halfD); g.add(gB);
    }

    // Roof — pitched roof raised by roofLift. backOverhang/frontOverhang let
    // composite wings trim the inside end so it doesn't poke through the main
    // wing's roof.
    const roof = Parts.pitchedRoof(WALL_D, frontOverhang, backOverhang);
    roof.position.y = roofLift;
    g.add(roof);

    // Per-floor windows for any floor above the ground floor — small windows on
    // both long sides AND on both gable faces (so tall houses don't have blank
    // gable walls).
    for (let f = 1; f < floors; f++) {
      const yOff = f * H.WALL_H;
      for (let i = 0; i < length; i++) {
        const cellZ = -((length - 1) / 2) + i;
        const wR = Parts.window('side', 'small');
        wR.position.set( halfW + 0.005, 0.32 + yOff, cellZ); g.add(wR);
        const wL = Parts.window('side', 'small');
        wL.position.set(-halfW - 0.005, 0.32 + yOff, cellZ);
        wL.rotation.y = Math.PI;
        g.add(wL);
      }
      // Gable-face upper windows at cluster's two ends
      const wGF = Parts.window('gable', 'small');
      wGF.position.set(0, 0.32 + yOff, halfD + 0.005); g.add(wGF);
      const wGB = Parts.window('gable', 'small');
      wGB.position.set(0, 0.32 + yOff, -halfD - 0.005);
      wGB.rotation.y = Math.PI;
      g.add(wGB);
    }

    // Per-cell ground-floor decorations (door, window, chimney, step) — same as before.
    const chimneyTopsLocal = [];
    for (let i = 0; i < length; i++) {
      const cell = cells[i];
      const cellZ = -((length - 1) / 2) + i;

      if (cell.face === 'gable') {
        const door = Parts.door('gable');
        door.position.set(-0.12, 0, halfD + 0.01); g.add(door);
        const win = Parts.window('gable');
        win.position.set(0.2, 0.32, halfD + 0.01); g.add(win);
        const step = Parts.step('gable');
        step.position.set(-0.12, 0.03, halfD + 0.08); g.add(step);
      } else if (cell.face === 'side') {
        const dx = halfW + 0.005;
        const door = Parts.door('side');
        door.position.set(dx, 0, cellZ - 0.1); g.add(door);
        const win = Parts.window('side');
        win.position.set(dx, 0.32, cellZ + 0.18); g.add(win);
        const step = Parts.step('side');
        step.position.set(dx + 0.06, 0.03, cellZ - 0.1); g.add(step);
        const bwin = Parts.window('side', 'small');
        bwin.position.set(-halfW - 0.005, 0.32, cellZ);
        bwin.rotation.y = Math.PI;
        g.add(bwin);
      }

      // Chimney — bottom hides at the top floor's wall top, top sits 0.30
      // above the wall top regardless of floors.
      const chim = Parts.chimney();
      const chimX = -0.28;
      const chimZ = cellZ + (cell.chimneyOffset || 0);
      chim.position.set(chimX, wallHTotal + 0.30, chimZ); g.add(chim);
      chimneyTopsLocal.push(new THREE.Vector3(chimX, wallHTotal + 0.60, chimZ));
    }

    // External staircase + upper door — only when there's exactly 2 floors.
    // Stairs sit alongside the +x face, climbing from south (bottom) to north
    // (top); the upper door sits at the top, on the +x wall at floor 2 height.
    if (floors === 2) {
      const stairsBottomZ = halfD - 0.10;
      const stairsX = halfW + 0.13;
      const stairsTopZ = stairsBottomZ - 5 * 0.10; // 5 steps further north (z=-)
      const stairs = Parts.externalStairs(H.WALL_H);
      stairs.position.set(stairsX, 0, stairsBottomZ);
      g.add(stairs);
      const upd = Parts.upperDoor();
      upd.position.set(halfW + 0.005, H.WALL_H, stairsTopZ);
      g.add(upd);
    }

    castReceive(g);

    let chimneyTops;
    if (orientation === 'x') {
      g.rotation.y = Math.PI / 2;
      const ax = new THREE.Vector3(0, 1, 0);
      chimneyTops = chimneyTopsLocal.map(v => v.clone().applyAxisAngle(ax, Math.PI / 2));
    } else {
      chimneyTops = chimneyTopsLocal;
    }
    g.userData = { kind: 'house', chimneyTops };
    return g;
  }

  function makeHouse(floors = 1) {
    return buildHouse(linearHousePlan(1), 'z', floors);
  }

  function makeStretchedHouse(length, orientation, floors = 1) {
    return buildHouse(linearHousePlan(length), orientation, floors);
  }

  // Square (2x2) farmhouse — single rectangular footprint with a hipped
  // (pyramidal) roof. Door + window pair at the +z face, exterior stairs at
  // floors === 2 on the +x side.
  function buildSquareHouse(floors = 1) {
    const g = new THREE.Group();
    const SIDE = 2 * TILE - 0.18; // 1.82
    const halfSide = SIDE / 2;
    const wallH = H.WALL_H * floors;

    // Walls — roundedBox extrudes from y=0 upward, so no y-shift needed.
    const walls = new THREE.Mesh(roundedBox(SIDE, wallH, SIDE, 0.04), M.wallCream);
    g.add(walls);

    // Hipped roof at the top of the wall stack
    const roof = Parts.hippedRoof(SIDE, SIDE, 0.65);
    roof.position.y = wallH;
    g.add(roof);

    // Roof eave trim — a thin dark rim around the roof base for visual punch
    const eaveR = new THREE.Mesh(new THREE.BoxGeometry(SIDE + 0.04, 0.04, SIDE + 0.04), M.roofBlueD);
    eaveR.position.y = wallH + 0.02;
    g.add(eaveR);

    // Door + window pair on +z face
    const door = Parts.door('gable');
    door.position.set(0, 0, halfSide + 0.01); g.add(door);
    const winR = Parts.window('gable');
    winR.position.set( 0.45, 0.32, halfSide + 0.01); g.add(winR);
    const winL = Parts.window('gable');
    winL.position.set(-0.45, 0.32, halfSide + 0.01); g.add(winL);
    const step = Parts.step('gable');
    step.position.set(0, 0.03, halfSide + 0.08); g.add(step);

    // Side windows along -x and back -z faces (one per side, ground floor)
    const wB = Parts.window('side');
    wB.position.set(-halfSide - 0.005, 0.32, 0); g.add(wB);
    wB.rotation.y = Math.PI;
    const wRside = Parts.window('side');
    wRside.position.set( halfSide + 0.005, 0.32, -0.45); g.add(wRside);

    // Per-floor windows on all 4 faces for upper floors
    for (let f = 1; f < floors; f++) {
      const yOff = f * H.WALL_H;
      const upperWindows = [
        { x: -0.45, z:  halfSide + 0.005, rot: 0 },
        { x:  0.45, z:  halfSide + 0.005, rot: 0 },
        { x: -0.45, z: -halfSide - 0.005, rot: Math.PI },
        { x:  0.45, z: -halfSide - 0.005, rot: Math.PI },
        { x:  halfSide + 0.005, z:  0.45, rot: 0,        side: true },
        { x:  halfSide + 0.005, z: -0.45, rot: 0,        side: true },
        { x: -halfSide - 0.005, z:  0.45, rot: Math.PI,  side: true },
        { x: -halfSide - 0.005, z: -0.45, rot: Math.PI,  side: true },
      ];
      for (const p of upperWindows) {
        const w = Parts.window(p.side ? 'side' : 'gable', 'small');
        w.position.set(p.x, 0.32 + yOff, p.z);
        w.rotation.y = p.rot;
        g.add(w);
      }
    }

    // Two chimneys for visual interest, on opposite corners
    const chimneyTopsLocal = [];
    [
      { x: -0.55, z: -0.55 },
      { x:  0.55, z:  0.55 },
    ].forEach(c => {
      const chim = Parts.chimney();
      chim.position.set(c.x, wallH + 0.30, c.z); g.add(chim);
      chimneyTopsLocal.push(new THREE.Vector3(c.x, wallH + 0.60, c.z));
    });

    // External stairs on +x face when floors === 2
    if (floors === 2) {
      const stairsBottomZ = halfSide - 0.10;
      const stairsX = halfSide + 0.13;
      const stairsTopZ = stairsBottomZ - 5 * 0.10;
      const stairs = Parts.externalStairs(H.WALL_H);
      stairs.position.set(stairsX, 0, stairsBottomZ);
      g.add(stairs);
      const upd = Parts.upperDoor();
      upd.position.set(halfSide + 0.005, H.WALL_H, stairsTopZ);
      g.add(upd);
    }

    castReceive(g);
    g.userData = { kind: 'house', chimneyTops: chimneyTopsLocal };
    return g;
  }

  // Composite house — a main wing (linear stretched house) plus 1+ single-cell
  // perpendicular side wings. Each side wing is a length-1 house oriented and
  // rotated to face away from the main wing; positioned so the wing's gable
  // touches the main wing's outer wall (no visible gap). Junction geometry
  // overlaps slightly which is hidden by Z-buffer / matching wall material.
  function buildCompositeHouse(topology, floors = 1) {
    const { mainOrientation, mainCells, branches, bbox } = topology;
    const composite = new THREE.Group();
    const allChimneyTops = [];

    const bboxCX = (bbox.xMin + bbox.xMax) / 2;
    const bboxCZ = (bbox.zMin + bbox.zMax) / 2;

    // Main wing: positioned at its run's centre, in composite-local coords.
    const mainLength = mainCells.length;
    const first = mainCells[0], last = mainCells[mainCells.length - 1];
    const mainCX = mainOrientation === 'z' ? first.x          : (first.x + last.x) / 2;
    const mainCZ = mainOrientation === 'z' ? (first.z + last.z) / 2 : first.z;
    const mainOX = mainCX - bboxCX;
    const mainOZ = mainCZ - bboxCZ;

    const mainWing = buildHouse(linearHousePlan(mainLength), mainOrientation, floors);
    mainWing.position.set(mainOX, 0, mainOZ);
    composite.add(mainWing);
    for (const top of (mainWing.userData.chimneyTops || [])) {
      allChimneyTops.push(new THREE.Vector3(top.x + mainOX, top.y, top.z + mainOZ));
    }

    // Side wings (always 1 cell each, only render external stairs once on the
    // main wing — pass floors=floors but suppress stairs for wings by passing 1).
    const SHIFT = 0.18;
    const ax = new THREE.Vector3(0, 1, 0);
    for (const br of branches) {
      let wingX = br.x - bboxCX;
      let wingZ = br.z - bboxCZ;
      if      (br.axis === '+x') wingX -= SHIFT;
      else if (br.axis === '-x') wingX += SHIFT;
      else if (br.axis === '+z') wingZ -= SHIFT;
      else                       wingZ += SHIFT;

      const wingOrientation = (br.axis === '+x' || br.axis === '-x') ? 'x' : 'z';
      // Wings trim their inside-end overhang AND suppress their back gable so
      // the roof clips cleanly at the main wing's outer wall without redundant
      // / coplanar geometry. The "back" of a wing (pre-rotation -z gable, no
      // door) is always the side facing the main wing.
      const wing = buildHouse(linearHousePlan(1), wingOrientation, floors, {
        backOverhang: 0,
        suppressBackGable: true,
      });
      const flip = (br.axis === '-x' || br.axis === '-z');
      if (flip) wing.rotation.y += Math.PI;
      wing.position.set(wingX, 0, wingZ);
      composite.add(wing);

      for (const top of (wing.userData.chimneyTops || [])) {
        const r = flip ? top.clone().applyAxisAngle(ax, Math.PI) : top;
        allChimneyTops.push(new THREE.Vector3(r.x + wingX, r.y, r.z + wingZ));
      }
    }

    composite.userData = { kind: 'house', chimneyTops: allChimneyTops };
    return composite;
  }

  function makeFence(neighbors) {
    neighbors = neighbors || { n: false, s: false, e: false, w: false };
    const g = new THREE.Group();
    const postGeo = new THREE.BoxGeometry(0.09, 0.32, 0.09);

    // Drop a corner post if either of its two adjacent sides has a fence neighbour
    // (the neighbour cell's own corner post sits right next to it, so we'd get
    // chunky double-posts at every cell boundary in a run).
    const corners = [
      [-0.4, -0.4, neighbors.n || neighbors.w], // NW
      [ 0.4, -0.4, neighbors.n || neighbors.e], // NE
      [-0.4,  0.4, neighbors.s || neighbors.w], // SW
      [ 0.4,  0.4, neighbors.s || neighbors.e], // SE
    ];
    for (const [px, pz, drop] of corners) {
      if (drop) continue;
      const p = new THREE.Mesh(postGeo, M.fence);
      p.position.set(px, 0.16, pz);
      g.add(p);
    }

    // Rails on each side, skipped where a neighbour exists (run merges cleanly).
    const railH = new THREE.BoxGeometry(0.72, 0.06, 0.06); // along x (north/south sides)
    const railV = new THREE.BoxGeometry(0.06, 0.06, 0.72); // along z (west/east sides)
    if (!neighbors.n) {
      const a = new THREE.Mesh(railH, M.fence); a.position.set(0, 0.24, -0.4); g.add(a);
      const b = new THREE.Mesh(railH, M.fence); b.position.set(0, 0.08, -0.4); g.add(b);
    }
    if (!neighbors.s) {
      const a = new THREE.Mesh(railH, M.fence); a.position.set(0, 0.24,  0.4); g.add(a);
      const b = new THREE.Mesh(railH, M.fence); b.position.set(0, 0.08,  0.4); g.add(b);
    }
    if (!neighbors.w) {
      const a = new THREE.Mesh(railV, M.fence); a.position.set(-0.4, 0.24, 0); g.add(a);
      const b = new THREE.Mesh(railV, M.fence); b.position.set(-0.4, 0.08, 0); g.add(b);
    }
    if (!neighbors.e) {
      const a = new THREE.Mesh(railV, M.fence); a.position.set( 0.4, 0.24, 0); g.add(a);
      const b = new THREE.Mesh(railV, M.fence); b.position.set( 0.4, 0.08, 0); g.add(b);
    }

    g.userData = { kind: 'fence' };
    castReceive(g);
    return g;
  }

  function makeCrop() {
    const g = new THREE.Group();
    const positions = [[-0.22, -0.22], [0.22, -0.22], [-0.22, 0.22], [0.22, 0.22]];
    positions.forEach(([x, z], i) => {
      const stem = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.08), M.cropStem);
      stem.position.set(x, 0.06, z);
      g.add(stem);
      const leaf = new THREE.Mesh(roundedBox(0.18, 0.16, 0.18, 0.04), M.cropLeaf);
      leaf.position.set(x, 0.16, z);
      leaf.rotation.y = i * 0.4;
      g.add(leaf);
    });
    g.userData = { kind: 'crop', bobPhase: Math.random() * Math.PI * 2 };
    castReceive(g);
    return g;
  }

  function makeTuft() {
    const g = new THREE.Group();
    const positions = [[0, 0], [0.08, 0.06], [-0.07, 0.04], [0.03, -0.08], [-0.04, -0.05]];
    positions.forEach(([x, z]) => {
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1 + Math.random() * 0.04, 0.05), M.leaves);
      blade.position.set(x, blade.geometry.parameters.height / 2, z);
      g.add(blade);
    });
    g.userData = { kind: 'tuft' };
    castReceive(g);
    return g;
  }

  // -------- world data --------
  // world[x][z] stores intent: terrain + the kind of object on it (string or null).
  // cellMeshes[key] stores the rendered meshes (tile + object). The object mesh
  // is rebuilt from world state + neighbor context, so adjacency-aware kinds
  // (fences, houses) re-render when a neighbor changes.
  const world = [];
  const cellMeshes = {}; // 'x,z' -> { tile, object }

  for (let x = 0; x < GRID; x++) {
    world[x] = [];
    for (let z = 0; z < GRID; z++) world[x][z] = { terrain: 'grass', kind: null, floors: 1 };
  }

  const MAX_FLOORS = 3;

  const worldGroup = new THREE.Group();
  scene.add(worldGroup);

  function tilePos(x, z) {
    return new THREE.Vector3(x - GRID / 2 + 0.5, 0, z - GRID / 2 + 0.5);
  }

  // -------- drop-in animation system --------
  // Each tile/object that wants to "land" gets pushed into dropAnims with a delay,
  // then ticks toward its target Y per frame. While landing, obj.userData.landing
  // is set so other position-Y animations (crop bob, smoke origin) yield to it.
  const dropAnims = [];
  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const easeOutBack = t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  };
  function animateDrop(obj, distance, dur, delay, easing) {
    const baseY = obj.position.y;
    obj.position.y = baseY + distance;
    obj.userData.landing = true;
    dropAnims.push({ obj, baseY, distance, t: -delay, dur, easing });
  }
  function tickDropAnims(dt) {
    for (let i = dropAnims.length - 1; i >= 0; i--) {
      const a = dropAnims[i];
      a.t += dt;
      if (a.t < 0) continue;
      const u = Math.min(1, a.t / a.dur);
      a.obj.position.y = a.baseY + a.distance * (1 - a.easing(u));
      if (u >= 1) {
        a.obj.position.y = a.baseY;
        a.obj.userData.landing = false;
        dropAnims.splice(i, 1);
      }
    }
  }

  // -------- adjacency helpers --------
  function getFenceNeighbors(x, z) {
    return {
      n: z > 0          && world[x][z - 1].kind === 'fence',
      s: z < GRID - 1   && world[x][z + 1].kind === 'fence',
      e: x < GRID - 1   && world[x + 1][z].kind === 'fence',
      w: x > 0          && world[x - 1][z].kind === 'fence',
    };
  }

  // Detect a "composite" topology — a long main wing plus 1+ single-cell
  // perpendicular branches (L-shape, T-shape, +-shape). Returns null if the
  // cluster doesn't fit this shape (e.g. solid 2x2 square, multi-cell branches).
  function tryComposite(cluster) {
    if (cluster.length < 2) return null;
    const xs = cluster.map(c => c.x), zs = cluster.map(c => c.z);
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    const zMin = Math.min(...zs), zMax = Math.max(...zs);

    const rowCounts = {}, colCounts = {};
    for (const c of cluster) {
      rowCounts[c.z] = (rowCounts[c.z] || 0) + 1;
      colCounts[c.x] = (colCounts[c.x] || 0) + 1;
    }
    const maxRowCount = Math.max(...Object.values(rowCounts));
    const maxColCount = Math.max(...Object.values(colCounts));

    let mainOrientation, mainAxisCoord, mainCells;
    if (maxColCount >= maxRowCount && maxColCount >= 2) {
      mainOrientation = 'z';
      let bestX = null;
      for (const x of Object.keys(colCounts).map(Number).sort((a, b) => a - b)) {
        if (colCounts[x] === maxColCount) { bestX = x; break; }
      }
      mainAxisCoord = bestX;
      mainCells = cluster.filter(c => c.x === bestX).sort((a, b) => a.z - b.z);
    } else if (maxRowCount >= 2) {
      mainOrientation = 'x';
      let bestZ = null;
      for (const z of Object.keys(rowCounts).map(Number).sort((a, b) => a - b)) {
        if (rowCounts[z] === maxRowCount) { bestZ = z; break; }
      }
      mainAxisCoord = bestZ;
      mainCells = cluster.filter(c => c.z === bestZ).sort((a, b) => a.x - b.x);
    } else {
      return null;
    }

    // Main wing must be a contiguous run.
    for (let i = 1; i < mainCells.length; i++) {
      const prev = mainCells[i - 1], cur = mainCells[i];
      if (mainOrientation === 'z' && cur.z !== prev.z + 1) return null;
      if (mainOrientation === 'x' && cur.x !== prev.x + 1) return null;
    }

    // Side cells = everything not in the main run. Each must be a single-cell
    // branch attached to a main cell with no neighbouring side cell (no L-tail
    // or 2-cell branches in this version).
    const sideCells = cluster.filter(c =>
      mainOrientation === 'z' ? c.x !== mainAxisCoord : c.z !== mainAxisCoord
    );
    const branches = [];
    for (const sc of sideCells) {
      const adjacentMain = mainCells.find(mc =>
        Math.abs(mc.x - sc.x) + Math.abs(mc.z - sc.z) === 1
      );
      if (!adjacentMain) return null;
      const adjacentSide = sideCells.find(o =>
        o !== sc && Math.abs(o.x - sc.x) + Math.abs(o.z - sc.z) === 1
      );
      if (adjacentSide) return null;
      let axis;
      if      (sc.x === adjacentMain.x + 1) axis = '+x';
      else if (sc.x === adjacentMain.x - 1) axis = '-x';
      else if (sc.z === adjacentMain.z + 1) axis = '+z';
      else                                  axis = '-z';
      branches.push({ x: sc.x, z: sc.z, axis });
    }

    // Anchor: the cluster cell with smallest (x, then z). Used so only one
    // cell renders the composite mesh; others render nothing.
    const sorted = [...cluster].sort((a, b) => a.x - b.x || a.z - b.z);
    const anchorX = sorted[0].x, anchorZ = sorted[0].z;

    return {
      mainOrientation,
      mainCells,
      branches,
      bbox: { xMin, xMax, zMin, zMax },
      anchorX,
      anchorZ,
    };
  }

  // Walk ± along x and z from (x,z) over contiguous houses. Tries linear first,
  // then composite (L/T-shapes), then falls back to solo. Returns:
  //   { kind: 'linear',    isAnchor, length, orientation, anchorX, anchorZ }
  //   { kind: 'composite', isAnchor, topology }
  //   { kind: 'solo',      isAnchor: true,   anchorX, anchorZ }
  function findHouseCluster(x, z) {
    let xMin = x, xMax = x;
    while (xMin > 0          && world[xMin - 1][z].kind === 'house') xMin--;
    while (xMax < GRID - 1   && world[xMax + 1][z].kind === 'house') xMax++;
    let zMin = z, zMax = z;
    while (zMin > 0          && world[x][zMin - 1].kind === 'house') zMin--;
    while (zMax < GRID - 1   && world[x][zMax + 1].kind === 'house') zMax++;
    const xLen = xMax - xMin + 1, zLen = zMax - zMin + 1;

    if (xLen > 1 && zLen === 1) {
      let pure = true;
      for (let i = xMin; i <= xMax && pure; i++) {
        if ((z > 0        && world[i][z - 1].kind === 'house') ||
            (z < GRID - 1 && world[i][z + 1].kind === 'house')) pure = false;
      }
      if (pure) return { kind: 'linear', isAnchor: x === xMin, length: xLen, orientation: 'x', anchorX: xMin, anchorZ: z };
    }
    if (zLen > 1 && xLen === 1) {
      let pure = true;
      for (let j = zMin; j <= zMax && pure; j++) {
        if ((x > 0        && world[x - 1][j].kind === 'house') ||
            (x < GRID - 1 && world[x + 1][j].kind === 'house')) pure = false;
      }
      if (pure) return { kind: 'linear', isAnchor: z === zMin, length: zLen, orientation: 'z', anchorX: x, anchorZ: zMin };
    }

    // Linear failed → try square (2x2) first, then L/T composite.
    const cluster = bfsHouseCluster(x, z);

    const square = trySquare(cluster);
    if (square) {
      return {
        kind: 'square',
        isAnchor: x === square.anchorX && z === square.anchorZ,
        anchorX: square.anchorX,
        anchorZ: square.anchorZ,
      };
    }

    const composite = tryComposite(cluster);
    if (composite) {
      return {
        kind: 'composite',
        isAnchor: x === composite.anchorX && z === composite.anchorZ,
        anchorX: composite.anchorX,
        anchorZ: composite.anchorZ,
        topology: composite,
      };
    }

    return { kind: 'solo', isAnchor: true, anchorX: x, anchorZ: z };
  }

  // Detect a 2x2 solid square cluster — 4 cells forming a perfect 2x2 block,
  // anchored at the (xMin, zMin) corner. Returns null otherwise.
  function trySquare(cluster) {
    if (cluster.length !== 4) return null;
    const xs = cluster.map(c => c.x), zs = cluster.map(c => c.z);
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    const zMin = Math.min(...zs), zMax = Math.max(...zs);
    if (xMax - xMin !== 1 || zMax - zMin !== 1) return null;
    const cells = new Set(cluster.map(c => c.x + ',' + c.z));
    for (let i = xMin; i <= xMax; i++) {
      for (let j = zMin; j <= zMax; j++) {
        if (!cells.has(i + ',' + j)) return null;
      }
    }
    return { anchorX: xMin, anchorZ: zMin };
  }

  // 4-neighbour flood fill over connected houses, used to find every cell
  // potentially affected when a placement adds/removes a connection.
  function bfsHouseCluster(x, z) {
    const result = [];
    const seen = new Set();
    const queue = [{ x, z }];
    while (queue.length) {
      const c = queue.shift();
      const k = c.x + ',' + c.z;
      if (seen.has(k)) continue;
      seen.add(k);
      if (c.x < 0 || c.x >= GRID || c.z < 0 || c.z >= GRID) continue;
      if (world[c.x][c.z].kind !== 'house') continue;
      result.push(c);
      queue.push({ x: c.x + 1, z: c.z });
      queue.push({ x: c.x - 1, z: c.z });
      queue.push({ x: c.x, z: c.z + 1 });
      queue.push({ x: c.x, z: c.z - 1 });
    }
    return result;
  }

  // -------- low-level renderers (build the actual meshes from world state) --------
  function renderCellTile(x, z, opts) {
    const { animate = true, delay = 0 } = opts || {};
    const key = x + ',' + z;
    let entry = cellMeshes[key];
    if (!entry) entry = cellMeshes[key] = { tile: null, object: null };
    if (entry.tile) {
      worldGroup.remove(entry.tile);
      disposeGroup(entry.tile);
    }
    const tile = makeTile(world[x][z].terrain);
    const p = tilePos(x, z);
    tile.position.copy(p);
    tile.userData.gx = x;
    tile.userData.gz = z;
    worldGroup.add(tile);
    entry.tile = tile;
    if (animate) animateDrop(tile, 2.4, 0.42, delay, easeOutCubic);
  }

  function renderCellObject(x, z, opts) {
    const { animate = false, delay = 0 } = opts || {};
    const key = x + ',' + z;
    let entry = cellMeshes[key];
    if (!entry) entry = cellMeshes[key] = { tile: null, object: null };
    if (entry.object) {
      worldGroup.remove(entry.object);
      disposeGroup(entry.object);
      entry.object = null;
    }

    const kind = world[x][z].kind;
    if (!kind) return;

    let mesh = null;
    let posX = null, posZ = null;
    let setGridUserData = true;

    if      (kind === 'tree')  mesh = makeTree();
    else if (kind === 'tuft')  mesh = makeTuft();
    else if (kind === 'crop')  mesh = makeCrop();
    else if (kind === 'fence') mesh = makeFence(getFenceNeighbors(x, z));
    else if (kind === 'house') {
      const cluster = findHouseCluster(x, z);
      if (!cluster.isAnchor) return;          // non-anchor cluster cells render nothing
      const floors = world[x][z].floors || 1;
      if (cluster.kind === 'solo') {
        mesh = makeHouse(floors);
      } else if (cluster.kind === 'linear') {
        mesh = makeStretchedHouse(cluster.length, cluster.orientation, floors);
        // Position at cluster CENTRE (not the anchor cell), so the visible house
        // spans the run cleanly. Skip gx/gz so pickTile falls through to whichever
        // tile is actually under the cursor.
        const a = tilePos(cluster.anchorX, cluster.anchorZ);
        posX = a.x; posZ = a.z;
        if (cluster.orientation === 'x') posX += (cluster.length - 1) * TILE / 2;
        else                              posZ += (cluster.length - 1) * TILE / 2;
        setGridUserData = false;
      } else if (cluster.kind === 'composite') {
        mesh = buildCompositeHouse(cluster.topology, floors);
        // Position at cluster bounding-box centre so wings fall in place.
        const t = cluster.topology;
        posX = (t.bbox.xMin + t.bbox.xMax) / 2 - GRID / 2 + 0.5;
        posZ = (t.bbox.zMin + t.bbox.zMax) / 2 - GRID / 2 + 0.5;
        setGridUserData = false;
      } else if (cluster.kind === 'square') {
        mesh = buildSquareHouse(floors);
        // Centre the 2x2 mesh between the four cells.
        posX = (cluster.anchorX + 0.5) - GRID / 2 + 0.5;
        posZ = (cluster.anchorZ + 0.5) - GRID / 2 + 0.5;
        setGridUserData = false;
      }
    } else return;

    if (!mesh) return;
    if (posX === null) {
      const p = tilePos(x, z);
      posX = p.x; posZ = p.z;
    }
    mesh.position.set(posX, TOP_H, posZ);
    if (setGridUserData) {
      mesh.userData.gx = x;
      mesh.userData.gz = z;
    }
    mesh.userData.baseY = TOP_H;
    worldGroup.add(mesh);
    entry.object = mesh;
    if (animate) animateDrop(mesh, 2.0, 0.5, delay, easeOutBack);
  }

  function setCell(x, z, opts) {
    const { terrain, kind = null, floors, tileDelay = 0, objectDelay = 0, animate = true, forceTile = false } = opts;
    const prev = world[x][z] || { terrain: null, kind: null, floors: 1 };
    const terrainChanged = prev.terrain !== terrain;
    const kindChanged    = (prev.kind || null) !== (kind || null);
    // floors default: when placing a fresh kind, start at 1; when preserving the
    // same kind without specifying, keep the previous value.
    const newFloors = (floors !== undefined) ? floors
                    : (kindChanged ? 1 : (prev.floors || 1));
    const floorsChanged = (prev.floors || 1) !== newFloors;
    world[x][z] = { terrain, kind: kind || null, floors: newFloors };

    // For house clusters, every cell shares the floors count. Propagate to all.
    if (kind === 'house' && floorsChanged) {
      for (const c of bfsHouseCluster(x, z)) {
        if (c.x !== x || c.z !== z) world[c.x][c.z].floors = newFloors;
      }
    }

    if (terrainChanged || forceTile) {
      renderCellTile(x, z, { animate, delay: tileDelay });
    }
    if (!kindChanged && !floorsChanged) return;

    // The "primary" cell is whichever cell's mesh visually represents the change.
    // For house placements that join/extend a cluster, that's the cluster anchor —
    // not the click cell, since the click cell may render nothing.
    let primaryX = x, primaryZ = z;
    if (kind === 'house') {
      const c = findHouseCluster(x, z);
      primaryX = c.anchorX; primaryZ = c.anchorZ;
    }

    // Collect every cell whose rendered mesh might need to change: this cell,
    // its 4 neighbours, AND every house connected to those (so a cluster split
    // across multiple cells refreshes correctly).
    const toRefresh = new Map();
    toRefresh.set(x + ',' + z, { x, z });
    if (world[x][z].kind === 'house') {
      for (const c of bfsHouseCluster(x, z)) toRefresh.set(c.x + ',' + c.z, c);
    }
    for (const [dx, dz] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = x + dx, nz = z + dz;
      if (nx < 0 || nx >= GRID || nz < 0 || nz >= GRID) continue;
      const nk = world[nx][nz].kind;
      if (nk === 'fence') {
        toRefresh.set(nx + ',' + nz, { x: nx, z: nz });
      } else if (nk === 'house') {
        for (const c of bfsHouseCluster(nx, nz)) toRefresh.set(c.x + ',' + c.z, c);
      }
    }

    for (const c of toRefresh.values()) {
      const isPrimary = c.x === primaryX && c.z === primaryZ;
      renderCellObject(c.x, c.z, {
        animate: animate && isPrimary,
        delay:   isPrimary ? objectDelay : 0,
      });
    }
  }

  function disposeGroup(group) {
    group.traverse(o => {
      if (o.geometry) o.geometry.dispose();
    });
  }

  // -------- initial scene (matches the reference image) --------
  function loadInitialScene() {
    // Wipe any existing meshes + animation state so a Reset re-plays the drop.
    for (const key in cellMeshes) {
      const e = cellMeshes[key];
      if (e.tile) { worldGroup.remove(e.tile); disposeGroup(e.tile); }
      if (e.object) { worldGroup.remove(e.object); disposeGroup(e.object); }
    }
    for (const k of Object.keys(cellMeshes)) delete cellMeshes[k];
    for (let x = 0; x < GRID; x++)
      for (let z = 0; z < GRID; z++)
        world[x][z] = { terrain: null, kind: null, floors: 1 };
    dropAnims.length = 0;

    // Build the layout in one shot so each cell only animates once.
    const layout = {};
    for (let x = 0; x < GRID; x++)
      for (let z = 0; z < GRID; z++)
        layout[x + ',' + z] = { terrain: 'grass', kind: null };

    layout['2,3'] = { terrain: 'grass', kind: 'house' };
    for (let z = 4; z < GRID; z++) layout['2,' + z] = { terrain: 'path', kind: null };
    layout['0,5'] = { terrain: 'grass', kind: 'tree' };
    layout['5,1'] = { terrain: 'grass', kind: 'tree' };
    for (let cx = 5; cx <= 6; cx++)
      for (let cz = 4; cz <= 5; cz++)
        layout[cx + ',' + cz] = { terrain: 'dirt', kind: 'crop' };
    layout['4,4'] = { terrain: 'grass', kind: 'fence' };
    layout['4,5'] = { terrain: 'grass', kind: 'fence' };
    layout['5,3'] = { terrain: 'grass', kind: 'fence' };
    layout['6,3'] = { terrain: 'grass', kind: 'fence' };
    layout['1,6'] = { terrain: 'grass', kind: 'tuft' };
    layout['4,6'] = { terrain: 'grass', kind: 'tuft' };
    layout['0,2'] = { terrain: 'grass', kind: 'tuft' };
    layout['6,7'] = { terrain: 'grass', kind: 'tuft' };

    // Diagonal sweep — small (x+z) lands first, far corner lands last.
    // Objects land slightly after their tile so it feels like layers stacking.
    const TILE_STAGGER = 0.035;
    const OBJECT_OFFSET = 0.22;
    for (let x = 0; x < GRID; x++) {
      for (let z = 0; z < GRID; z++) {
        const cell = layout[x + ',' + z];
        const baseDelay = (x + z) * TILE_STAGGER;
        setCell(x, z, {
          terrain: cell.terrain,
          kind: cell.kind,
          tileDelay: baseDelay,
          objectDelay: baseDelay + OBJECT_OFFSET,
        });
      }
    }
  }

  // -------- hover indicator --------
  const hoverGeo = roundedSlab(TILE * 1.0, 0.04, 0.07);
  const hoverMesh = new THREE.Mesh(hoverGeo, M.hover);
  hoverMesh.position.y = TOP_H + 0.01;
  hoverMesh.visible = false;
  scene.add(hoverMesh);

  let currentHover = null;

  // -------- raycaster --------
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();

  function pickTile(clientX, clientY) {
    ndc.x = (clientX / window.innerWidth) * 2 - 1;
    ndc.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObjects(worldGroup.children, true);
    for (const h of hits) {
      let n = h.object;
      while (n && (n.userData.gx === undefined)) n = n.parent;
      if (n && n.userData.gx !== undefined) return { x: n.userData.gx, z: n.userData.gz };
    }
    return null;
  }

  // -------- tools --------
  const TOOLS = [
    { id: 'grass',  label: 'Grass',  terrain: 'grass', color: '#9ec74b' },
    { id: 'path',   label: 'Path',   terrain: 'path',  color: '#e8d5a8' },
    { id: 'dirt',   label: 'Dirt',   terrain: 'dirt',  color: '#5a3b27' },
    { id: 'water',  label: 'Water',  terrain: 'water', color: '#4a90c2' },
    { id: 'house',  label: 'House',  kind: 'house', color: '#3a72c8' },
    { id: 'tree',   label: 'Tree',   kind: 'tree',  color: '#6fb442' },
    { id: 'fence',  label: 'Fence',  kind: 'fence', color: '#8a5a3b' },
    { id: 'crop',   label: 'Crop',   kind: 'crop',  terrainOverride: 'dirt', color: '#86c544' },
    { id: 'tuft',   label: 'Tuft',   kind: 'tuft',  color: '#86b53e' },
    { id: 'erase',  label: 'Erase',  erase: true, color: 'transparent', eraser: true },
  ];

  let selectedTool = TOOLS[5]; // start on Tree — feels inviting

  function buildToolbar() {
    const bar = document.getElementById('toolbar');
    bar.innerHTML = '';
    TOOLS.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'tool';
      btn.dataset.id = t.id;
      const swatch = document.createElement('div');
      swatch.className = 'swatch' + (t.eraser ? ' eraser' : '');
      if (!t.eraser) swatch.style.background = t.color;
      btn.appendChild(swatch);
      const lbl = document.createElement('span');
      lbl.textContent = t.label;
      btn.appendChild(lbl);
      const k = document.createElement('kbd');
      k.textContent = i < 9 ? String(i + 1) : 'E';
      btn.appendChild(k);
      btn.addEventListener('click', () => selectTool(t));
      if (t === selectedTool) btn.classList.add('active');
      bar.appendChild(btn);
    });
  }

  function selectTool(t) {
    selectedTool = t;
    document.querySelectorAll('.tool').forEach(b => {
      b.classList.toggle('active', b.dataset.id === t.id);
    });
    hoverMesh.material = t.erase ? M.hoverErase : M.hover;
  }

  // -------- click → place / erase --------
  function applyTool(x, z) {
    const cell = world[x][z];
    if (selectedTool.erase) {
      if (cell.kind) setCell(x, z, { terrain: cell.terrain, kind: null });
      else if (cell.terrain !== 'grass') setCell(x, z, { terrain: 'grass', kind: null });
      return;
    }
    if (selectedTool.kind === 'house' && cell.kind === 'house') {
      // Stack: clicking the house tool on an existing house adds a floor.
      const newFloors = Math.min((cell.floors || 1) + 1, MAX_FLOORS);
      if (newFloors === (cell.floors || 1)) return;
      setCell(x, z, { terrain: cell.terrain, kind: 'house', floors: newFloors });
      return;
    }
    if (selectedTool.kind) {
      const newTerrain = selectedTool.terrainOverride || cell.terrain;
      setCell(x, z, { terrain: newTerrain, kind: selectedTool.kind });
      return;
    }
    if (selectedTool.terrain) {
      setCell(x, z, { terrain: selectedTool.terrain, kind: cell.kind, floors: cell.floors });
    }
  }

  // -------- input: drag-to-orbit + click-to-place --------
  let pointerDown = null;     // {x, y}
  let lastPointer = null;
  let didDrag = false;
  const DRAG_THRESHOLD = 5;

  renderer.domElement.addEventListener('pointerdown', e => {
    if (e.button !== 0 && e.pointerType === 'mouse') return;
    pointerDown = { x: e.clientX, y: e.clientY };
    lastPointer = { x: e.clientX, y: e.clientY };
    didDrag = false;
    renderer.domElement.classList.add('dragging');
    renderer.domElement.setPointerCapture(e.pointerId);
  });

  renderer.domElement.addEventListener('pointermove', e => {
    // hover update always
    const cell = pickTile(e.clientX, e.clientY);
    if (cell) {
      const p = tilePos(cell.x, cell.z);
      hoverMesh.position.set(p.x, TOP_H + 0.02, p.z);
      hoverMesh.visible = true;
      currentHover = cell;
    } else {
      hoverMesh.visible = false;
      currentHover = null;
    }

    if (pointerDown) {
      const dx = e.clientX - pointerDown.x;
      const dy = e.clientY - pointerDown.y;
      if (!didDrag && Math.abs(dx) + Math.abs(dy) > DRAG_THRESHOLD) didDrag = true;
      if (didDrag) {
        const ddx = e.clientX - lastPointer.x;
        const ddy = e.clientY - lastPointer.y;
        azimuth -= ddx * 0.008;
        polar = Math.max(0.18, Math.min(1.25, polar - ddy * 0.006));
        updateCamera();
      }
      lastPointer = { x: e.clientX, y: e.clientY };
    }
  });

  renderer.domElement.addEventListener('pointerup', e => {
    renderer.domElement.classList.remove('dragging');
    if (pointerDown && !didDrag && currentHover) {
      applyTool(currentHover.x, currentHover.z);
    }
    pointerDown = null;
    lastPointer = null;
  });

  renderer.domElement.addEventListener('pointercancel', () => {
    renderer.domElement.classList.remove('dragging');
    pointerDown = null;
  });

  renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();
    viewSize = Math.max(4, Math.min(14, viewSize + e.deltaY * 0.005));
    onResize();
  }, { passive: false });

  // keyboard shortcuts
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const k = e.key.toLowerCase();
    if (k >= '1' && k <= '9') {
      const idx = parseInt(k, 10) - 1;
      if (TOOLS[idx]) selectTool(TOOLS[idx]);
    } else if (k === 'e') selectTool(TOOLS[9]);
    else if (k === 'r') doReset();
    else if (k === 'c') doClear();
    else if (k === 'p' || k === 'i') togglePerspective();
  });

  document.getElementById('reset').addEventListener('click', doReset);
  document.getElementById('clear').addEventListener('click', doClear);
  const perspBtn = document.getElementById('persp');
  perspBtn.addEventListener('click', togglePerspective);

  function togglePerspective() {
    cameraMode = cameraMode === 'ortho' ? 'perspective' : 'ortho';
    camera = cameraMode === 'ortho' ? orthoCam : persCam;
    perspBtn.classList.toggle('on', cameraMode === 'perspective');
    onResize();
  }

  function doReset() { loadInitialScene(); }
  function doClear() {
    const TILE_STAGGER = 0.022;
    for (let x = 0; x < GRID; x++)
      for (let z = 0; z < GRID; z++)
        setCell(x, z, {
          terrain: 'grass',
          kind: null,
          tileDelay: (x + z) * TILE_STAGGER,
          forceTile: true,
        });
  }

  // -------- chimney smoke --------
  const smokeMat = new THREE.MeshBasicMaterial({ color: 0xd4cfc2, transparent: true, opacity: 0.65, depthWrite: false });
  const smokeGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const smokeParticles = [];

  function spawnSmoke(houseObj) {
    const tops = houseObj.userData.chimneyTops
      || (houseObj.userData.chimneyTop ? [houseObj.userData.chimneyTop] : []);
    for (const top of tops) {
      const s = new THREE.Mesh(smokeGeo, smokeMat.clone());
      s.position.set(
        houseObj.position.x + top.x + (Math.random() - 0.5) * 0.02,
        houseObj.position.y + top.y,
        houseObj.position.z + top.z + (Math.random() - 0.5) * 0.02
      );
      s.userData = {
        life: 0,
        maxLife: 2.4 + Math.random() * 0.6,
        vy: 0.45 + Math.random() * 0.2,
        vx: (Math.random() - 0.5) * 0.15,
        vz: (Math.random() - 0.5) * 0.15,
      };
      scene.add(s);
      smokeParticles.push(s);
    }
  }

  function updateSmoke(dt) {
    for (let i = smokeParticles.length - 1; i >= 0; i--) {
      const s = smokeParticles[i];
      s.userData.life += dt;
      const t = s.userData.life / s.userData.maxLife;
      s.position.y += s.userData.vy * dt;
      s.position.x += s.userData.vx * dt;
      s.position.z += s.userData.vz * dt;
      s.material.opacity = (1 - t) * 0.65;
      const sc = 1 + t * 1.4;
      s.scale.set(sc, sc, sc);
      if (t >= 1) {
        scene.remove(s);
        s.material.dispose();
        smokeParticles.splice(i, 1);
      }
    }
  }

  // -------- animation loop --------
  let prevT = 0;
  let smokeTimer = 0;
  function animate(now) {
    requestAnimationFrame(animate);
    const t = now / 1000;
    const dt = prevT ? Math.min(t - prevT, 0.05) : 0;
    prevT = t;

    // tile/object drop-in animations (load + placement)
    if (dropAnims.length) tickDropAnims(dt);

    // sway trees / bob crops / wiggle tufts
    for (const key in cellMeshes) {
      const obj = cellMeshes[key].object;
      if (!obj) continue;
      const k = obj.userData.kind;
      if (k === 'tree') {
        obj.rotation.z = Math.sin(t * 0.85 + obj.userData.swayPhase) * 0.022;
        obj.rotation.x = Math.cos(t * 0.65 + obj.userData.swayPhase) * 0.012;
      } else if (k === 'crop') {
        if (!obj.userData.landing)
          obj.position.y = obj.userData.baseY + Math.sin(t * 1.6 + obj.userData.bobPhase) * 0.03;
      } else if (k === 'tuft') {
        obj.rotation.z = Math.sin(t * 1.2 + (obj.userData.gx + obj.userData.gz)) * 0.05;
      }
    }

    // chimney smoke — skip while the house is still landing (origin would be airborne)
    smokeTimer += dt;
    if (smokeTimer > 0.18) {
      smokeTimer = 0;
      for (const key in cellMeshes) {
        const o = cellMeshes[key].object;
        if (o && o.userData.kind === 'house' && !o.userData.landing) spawnSmoke(o);
      }
    }
    updateSmoke(dt);

    renderer.render(scene, camera);
  }

  // -------- resize --------
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    const aspect = w / h;

    orthoCam.left = -viewSize * aspect;
    orthoCam.right = viewSize * aspect;
    orthoCam.top = viewSize;
    orthoCam.bottom = -viewSize;
    orthoCam.updateProjectionMatrix();

    persCam.aspect = aspect;
    persCam.updateProjectionMatrix();

    renderer.setSize(w, h);
    updateCamera();
  }
  window.addEventListener('resize', onResize);

  // -------- boot --------
  buildToolbar();
  selectTool(TOOLS[5]);
  loadInitialScene();
  onResize();
  requestAnimationFrame(animate);
  </script>
</body>
</html>
